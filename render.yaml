services:
  - type: web
    name: x95tools-pro
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free # Can be changed to paid if needed
    envVars:
      - key: PORT
        value: 10000
      - key: RENDER
        value: "true"
      - key: GROQ_API_KEY
        sync: false
